# Phase 3 Step 10 — CI/CD for the QuantCore platform (architectural standard v2 §10).
#
# PRs + pushes run the gate (tests + wrapper smoke + OpenAPI surface diff). Pushes to
# main additionally build the 4 images (Cloud Build, native amd64) and roll them out to
# the Cloud Run services + the report Job in the TEST project. Deploys carry ONLY the
# image tag — every service's env/secrets/Cloud-SQL binding is preserved from its last
# manual deploy (Steps 8–9), so CI never needs the DB DSN or JWT secret.
#
# One-time setup (see docs/proposals/phase3-gateway-plan.md Step 10): configure Workload
# Identity Federation and set repo secrets GCP_WIF_PROVIDER + GCP_DEPLOY_SA. The deploy
# SA needs roles/run.developer, roles/cloudbuild.builds.editor, roles/artifactregistry.writer,
# and iam.serviceAccountUser on the runtime SA. PROD-FLIP is deliberately NOT automated —
# it stays a manual, supervised config change (QUANTCORE_DB_DSN / Cloud SQL connector).
#
# TRIGGER STATUS — push/PR triggers are RESTORED, but the `deploy` job is guarded by a
# `preflight` job that only emits `has_creds=true` when the GCP_WIF_PROVIDER / GCP_DEPLOY_SA
# repo secrets are present. Until the test-project WIF is wired (run scripts/setup_test_wif.sh),
# those secrets are absent, so `deploy` is SKIPPED — it never fails auth on a `main` push. Once
# the script has created the WIF pool/provider + quantcore-deployer SA and set the two secrets,
# pushes to main auto-roll-out with no further workflow edit. The `gate` job always runs.
# PROD-FLIP stays manual/supervised (QUANTCORE_DB_DSN / Cloud SQL connector) — never automated.

name: deploy

on:
  workflow_dispatch:
  push:
    branches: [main]
  pull_request:

# Serialize deploys per ref so back-to-back merges to main don't race on the same
# Cloud Run services (concurrent `gcloud run deploy` on one service ABORTs with an
# optimistic-lock "version was specified but current version is …" conflict). A new
# run waits for the in-flight one to finish rather than cancelling it mid-rollout.
# Keyed by ref, so PR gate runs (distinct refs) still run in parallel with main.
concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: false

env:
  PROJECT_ID: quantcore-test-20260606
  REGION: us-central1
  AR_REPO: quantcore

jobs:
  gate:
    name: Tests + wrapper smoke + OpenAPI surface
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: quantcore
          POSTGRES_PASSWORD: quantcore
          POSTGRES_DB: quantcore
        ports: ["5432:5432"]
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      # init_schema() creates all 16 tables on a blank Postgres; AUTH stays inert.
      QUANTCORE_DB_DSN: postgresql://quantcore:quantcore@localhost:5432/quantcore
      AUTH_DISABLED: "1"
      PYTHONPATH: .
    steps:
      - uses: actions/checkout@v4
        with:
          # Full history so diff-cover can diff PR changes against origin/main.
          fetch-depth: 0
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - name: Install lean deps (+ coverage tooling)
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-dev.txt
      - name: Unit tests (under coverage)
        run: coverage run -m unittest discover -v
      # COVERAGE RATCHET: the floor below is pinned ~1pt under the measured
      # baseline (55.3% on 2026-07-15 after the coverage-uplift suites; scope
      # in .coveragerc). It only ever moves UP — when a PR meaningfully raises
      # coverage, bump it in the same PR. The behavioral gate is diff-cover:
      # changed lines need >= 85%.
      - name: Coverage report + floor
        run: |
          coverage report
          coverage report --format=markdown >> "$GITHUB_STEP_SUMMARY"
          coverage report --fail-under=54
      - name: Diff coverage (changed lines >= 85%, PRs only)
        if: github.event_name == 'pull_request'
        run: |
          coverage xml
          diff-cover coverage.xml --compare-branch "origin/${{ github.base_ref }}" \
            --fail-under 85 --markdown-report diff-cover.md
          cat diff-cover.md >> "$GITHUB_STEP_SUMMARY"
      - name: Coverage HTML artifact
        if: always()
        run: coverage html
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: backend-coverage-html
          path: htmlcov/
          retention-days: 14
      - name: Wrapper smoke (boot each server, assert listTools schemas)
        run: python scripts/ci_wrapper_smoke.py
      - name: OpenAPI surface diff
        run: python scripts/check_openapi_snapshot.py

  frontend-gate:
    name: Frontend tests + typecheck + coverage
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - name: Install
        run: npm ci
      - name: Typecheck
        run: npx tsc -b --noEmit
      # Thresholds (the frontend ratchet) live in vitest.config.ts — vitest
      # itself fails this step on regression. Baselines noted in that file.
      - name: Vitest with coverage
        run: npx vitest run --coverage
      - name: Coverage summary
        if: always()
        run: |
          if [ -f coverage/coverage-summary.json ]; then
            node -e '
              const s = require("./coverage/coverage-summary.json").total;
              const row = (k) => `| ${k} | ${s[k].pct}% (${s[k].covered}/${s[k].total}) |`;
              console.log("### Frontend coverage\n\n| Metric | Coverage |\n|---|---|");
              for (const k of ["lines", "statements", "functions", "branches"]) console.log(row(k));
            ' >> "$GITHUB_STEP_SUMMARY"
          fi
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: frontend-coverage-html
          path: frontend/coverage/
          retention-days: 14

  preflight:
    name: Check deploy credentials are configured
    needs: gate
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    runs-on: ubuntu-latest
    outputs:
      has_creds: ${{ steps.check.outputs.has_creds }}
    steps:
      - id: check
        # Secrets can't be referenced in a job-level `if`, so probe them here and
        # publish a boolean output the `deploy` job gates on. Absent secrets ⇒ skip,
        # never a hard auth failure.
        env:
          WIF_PROVIDER: ${{ secrets.GCP_WIF_PROVIDER }}
          DEPLOY_SA: ${{ secrets.GCP_DEPLOY_SA }}
        run: |
          if [ -n "$WIF_PROVIDER" ] && [ -n "$DEPLOY_SA" ]; then
            echo "has_creds=true" >> "$GITHUB_OUTPUT"
            echo "Deploy credentials present — deploy job will run."
          else
            echo "has_creds=false" >> "$GITHUB_OUTPUT"
            echo "GCP_WIF_PROVIDER / GCP_DEPLOY_SA not set — skipping deploy (run scripts/setup_test_wif.sh)."
          fi

  deploy:
    name: Build + roll out to Cloud Run (test project)
    needs: [gate, frontend-gate, preflight]
    if: needs.preflight.outputs.has_creds == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write # Workload Identity Federation
    steps:
      - uses: actions/checkout@v4
      - id: auth
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.GCP_WIF_PROVIDER }}
          service_account: ${{ secrets.GCP_DEPLOY_SA }}
      - uses: google-github-actions/setup-gcloud@v2
      - name: Build + push the 4 images (Cloud Build, amd64)
        run: |
          gcloud builds submit --project "$PROJECT_ID" \
            --config cloudbuild.yaml \
            --substitutions _TAG="${GITHUB_SHA::7}"
      - name: Deploy quantcore-api
        run: |
          gcloud run deploy quantcore-api --project "$PROJECT_ID" --region "$REGION" \
            --image "$REGION-docker.pkg.dev/$PROJECT_ID/$AR_REPO/quantcore-api:${GITHUB_SHA::7}"
      - name: Deploy the 5 wrappers (shared mcp image; per-service env preserved)
        run: |
          for s in stock-price options-analysis company-fundamentals news-sentiment market-analysis; do
            gcloud run deploy "quantcore-$s" --project "$PROJECT_ID" --region "$REGION" \
              --image "$REGION-docker.pkg.dev/$PROJECT_ID/$AR_REPO/quantcore-mcp:${GITHUB_SHA::7}"
          done
      - name: Update report Job image
        run: |
          gcloud run jobs update quantcore-report --project "$PROJECT_ID" --region "$REGION" \
            --image "$REGION-docker.pkg.dev/$PROJECT_ID/$AR_REPO/quantcore-report:${GITHUB_SHA::7}"
      - name: Deploy quantui (image-only; IAP + secret + REST URL preserved)
        # quantui's FIRST deploy is the manual --iap step (see quantui-iap-plan.md Step 5),
        # which also sets --no-allow-unauthenticated, the QUANTCORE_API_TOKEN secret, and
        # QUANTCORE_REST_URL. Those persist across image-only redeploys. Until that one-time
        # deploy exists, skip rather than fail (a fresh service can't be image-only deployed).
        run: |
          if gcloud run services describe quantui --project "$PROJECT_ID" --region "$REGION" >/dev/null 2>&1; then
            gcloud run deploy quantui --project "$PROJECT_ID" --region "$REGION" \
              --image "$REGION-docker.pkg.dev/$PROJECT_ID/$AR_REPO/quantcore-ui:${GITHUB_SHA::7}"
          else
            echo "quantui service not found — first deploy is the manual --iap step; skipping image roll-out."
          fi
