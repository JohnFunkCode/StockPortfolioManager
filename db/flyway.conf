# Flyway configuration for the QuantCore database.
#
# No credentials live in this file. Connection settings come from the
# environment — derive them from the DSN in .env before running:
#
#   DSN="$(grep '^QUANTCORE_TEST_DB_DSN=' .env | cut -d= -f2-)"   # or QUANTCORE_DB_DSN for prod promotion
#   export FLYWAY_URL="jdbc:postgresql://$(echo "$DSN" | sed -E 's|.*@([^/]+)/.*|\1|')/quantcore"
#   export FLYWAY_USER="$(echo "$DSN" | sed -E 's|postgresql://([^:]+):.*|\1|')"
#   export FLYWAY_PASSWORD="$(echo "$DSN" | sed -E 's|postgresql://[^:]+:([^@]+)@.*|\1|')"
#   flyway -configFiles=db/flyway.conf info
#
# Workflow (docs/proposals/phase1-migration-plan.md): migrations are developed
# and applied against the TEST database first; promotion to production is a
# separate, user-initiated step taken only after Phase 1 exit criteria pass,
# preceded by a fresh pg_dump backup.

flyway.locations=filesystem:db/migrations

# The deployed databases already contain the 16-table schema created by
# quantcore/db.py init_schema(). Baseline that as version 1; the first real
# migration is V2.
flyway.baselineOnMigrate=true
flyway.baselineVersion=1
flyway.baselineDescription=existing quantcore 16-table schema
